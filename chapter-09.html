<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter-09 数学算法</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .problem-done { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">chapter-09 数学算法</h1>
        <p class="text-center text-gray-500 mb-4">来源：<a href="https://leetcode.cn/circle/discuss/IYT3ss/" target="_blank" class="text-blue-600 hover:underline">原题单</a></p>
        
        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">一、数论</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="204"><a href="https://leetcode.cn/problems/count-primes/" target="_blank" class="text-blue-600 hover:underline">204. 计数质数</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="172"><a href="https://leetcode.cn/problems/factorial-trailing-zeroes/" target="_blank" class="text-blue-600 hover:underline">172. 阶乘后的零</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="50"><a href="https://leetcode.cn/problems/powx-n/" target="_blank" class="text-blue-600 hover:underline">50. Pow(x, n)</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">二、组合数学</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="62"><a href="https://leetcode.cn/problems/unique-paths/" target="_blank" class="text-blue-600 hover:underline">62. 不同路径</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="70"><a href="https://leetcode.cn/problems/climbing-stairs/" target="_blank" class="text-blue-600 hover:underline">70. 爬楼梯</a></label></li>
        </ul>

        <p class="text-center text-gray-500 mt-12">作者：灵茶山艾府 | <a href="https://leetcode.cn/circle/discuss/IYT3ss/" target="_blank" class="text-blue-600 hover:underline">原文链接</a></p>
    </div>

    <script>
        const chapter = 'chapter-09';
        const saved = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
        document.querySelectorAll('input[data-id]').forEach(cb => {
            if (saved[cb.dataset.id]) cb.checked = true;
            cb.addEventListener('change', function() {
                const progress = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
                if (this.checked) progress[this.dataset.id] = true;
                else delete progress[this.dataset.id];
                localStorage.setItem(chapter + '-progress', JSON.stringify(progress));
            });
        });
    </script>
</body>
</html>
