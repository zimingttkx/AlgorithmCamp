# AlgorithmCamp Docker Compose Configuration
# Production deployment with PostgreSQL and Nginx

services:
  postgres:
    image: postgres:16-alpine
    container_name: algorithmcamp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-algorithmcamp}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-algorithmcamp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: algorithmcamp-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../app/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      # SSL certificates (mount after Certbot generates them)
      # - ./certbot/conf:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Certbot for SSL certificates
  # certbot:
  #   image: certbot/certbot
  #   container_name: algorithmcamp-certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt:rw
  #     - ./certbot/www:/var/www/certbot:rw
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done &'"
  #   profiles:
  #     - certbot

volumes:
  postgres_data:
  nginx_logs:

networks:
  default:
    name: algorithmcamp-network
