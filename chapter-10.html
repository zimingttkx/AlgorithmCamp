<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter-10 贪心与思维</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .problem-done { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">chapter-10 贪心与思维</h1>
        <p class="text-center text-gray-500 mb-4">来源：<a href="https://leetcode.cn/discuss/post/g6KTKL/" target="_blank" class="text-blue-600 hover:underline">原题单</a></p>
        
        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">一、基本贪心</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="455"><a href="https://leetcode.cn/problems/assign-cookies/" target="_blank" class="text-blue-600 hover:underline">455. 分发饼干</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="392"><a href="https://leetcode.cn/problems/is-subsequence/" target="_blank" class="text-blue-600 hover:underline">392. 判断子序列</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="376"><a href="https://leetcode.cn/problems/wiggle-subsequence/" target="_blank" class="text-blue-600 hover:underline">376. 摆动序列</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">二、区间问题</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="435"><a href="https://leetcode.cn/problems/non-overlapping-intervals/" target="_blank" class="text-blue-600 hover:underline">435. 无重叠区间</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="452"><a href="https://leetcode.cn/problems/minimum-number-of-arrows-to-burst-balloons/" target="_blank" class="text-blue-600 hover:underline">452. 用最少的箭引爆气球</a></label></li>
        </ul>

        <p class="text-center text-gray-500 mt-12">作者：灵茶山艾府 | <a href="https://leetcode.cn/discuss/post/g6KTKL/" target="_blank" class="text-blue-600 hover:underline">原文链接</a></p>
    </div>

    <script>
        const chapter = 'chapter-10';
        const saved = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
        document.querySelectorAll('input[data-id]').forEach(cb => {
            if (saved[cb.dataset.id]) cb.checked = true;
            cb.addEventListener('change', function() {
                const progress = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
                if (this.checked) progress[this.dataset.id] = true;
                else delete progress[this.dataset.id];
                localStorage.setItem(chapter + '-progress', JSON.stringify(progress));
            });
        });
    </script>
</body>
</html>
