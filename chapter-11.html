<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter-11 链表，二叉树与回溯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .problem-done { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">chapter-11 链表，二叉树与回溯</h1>
        <p class="text-center text-gray-500 mb-4">来源：<a href="https://leetcode.cn/discuss/post/3142882/" target="_blank" class="text-blue-600 hover:underline">原题单</a></p>
        
        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">一、链表</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="206"><a href="https://leetcode.cn/problems/reverse-linked-list/" target="_blank" class="text-blue-600 hover:underline">206. 反转链表</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="21"><a href="https://leetcode.cn/problems/merge-two-sorted-lists/" target="_blank" class="text-blue-600 hover:underline">21. 合并两个有序链表</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="141"><a href="https://leetcode.cn/problems/linked-list-cycle/" target="_blank" class="text-blue-600 hover:underline">141. 环形链表</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">二、二叉树</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="104"><a href="https://leetcode.cn/problems/maximum-depth-of-binary-tree/" target="_blank" class="text-blue-600 hover:underline">104. 二叉树的最大深度</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="226"><a href="https://leetcode.cn/problems/invert-binary-tree/" target="_blank" class="text-blue-600 hover:underline">226. 翻转二叉树</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="101"><a href="https://leetcode.cn/problems/symmetric-tree/" target="_blank" class="text-blue-600 hover:underline">101. 对称二叉树</a></label></li>
        </ul>

        <p class="text-center text-gray-500 mt-12">作者：灵茶山艾府 | <a href="https://leetcode.cn/discuss/post/3142882/" target="_blank" class="text-blue-600 hover:underline">原文链接</a></p>
    </div>

    <script>
        const chapter = 'chapter-11';
        const saved = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
        document.querySelectorAll('input[data-id]').forEach(cb => {
            if (saved[cb.dataset.id]) cb.checked = true;
            cb.addEventListener('change', function() {
                const progress = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
                if (this.checked) progress[this.dataset.id] = true;
                else delete progress[this.dataset.id];
                localStorage.setItem(chapter + '-progress', JSON.stringify(progress));
            });
        });
    </script>
</body>
</html>
