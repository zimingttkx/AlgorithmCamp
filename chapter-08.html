</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">

            <li><label><input type="checkbox" class="mr-2" data-id="303"><a href="https://leetcode.cn/problems/range-sum-query-immutable/" target="_blank" class="text-blue-600 hover:underline">303. 区域和检索</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="304"><a href="https://leetcode.cn/problems/range-sum-query-2d-immutable/" target="_blank" class="text-blue-600 hover:underline">304. 二维区域和检索</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="1109"><a href="https://leetcode.cn/problems/corporate-flight-bookings/" target="_blank" class="text-blue-600 hover:underline">1109. 航班预订统计</a></label></li>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">二、栈与队列</h2>
        <ul class="space-y-2 ml-4">

            <li><label><input type="checkbox" class="mr-2" data-id="155"><a href="https://leetcode.cn/problems/min-stack/" target="_blank" class="text-blue-600 hover:underline">155. 最小栈</a></label></li>

        <p class="text-center text-gray-500 mt-12">作者：灵茶山艾府 | <a href="https://leetcode.cn/circle/discuss/mOr1u6/" target="_blank" class="text-blue-600 hover:underline">原文链接</a></p>
    </div>

    <script>
        const chapter = 'chapter-08';
        const saved = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
        document.querySelectorAll('input[data-id]').forEach(cb => {
            if (saved[cb.dataset.id]) cb.checked = true;
            cb.addEventListener('change', function() {
                const progress = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
                if (this.checked) progress[this.dataset.id] = true;
                else delete progress[this.dataset.id];
                localStorage.setItem(chapter + '-progress', JSON.stringify(progress));
            });
        });
    </script>
