<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter-07 动态规划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .problem-done { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">chapter-07 动态规划</h1>
        <p class="text-center text-gray-500 mb-4">来源：<a href="https://leetcode.cn/discuss/post/3581838/" target="_blank" class="text-blue-600 hover:underline">原题单</a></p>
        
        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">一、入门</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="70"><a href="https://leetcode.cn/problems/climbing-stairs/" target="_blank" class="text-blue-600 hover:underline">70. 爬楼梯</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="198"><a href="https://leetcode.cn/problems/house-robber/" target="_blank" class="text-blue-600 hover:underline">198. 打家劫舍</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="413"><a href="https://leetcode.cn/problems/arithmetic-slices/" target="_blank" class="text-blue-600 hover:underline">413. 等差数列划分</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">二、背包问题</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="416"><a href="https://leetcode.cn/problems/partition-equal-subset-sum/" target="_blank" class="text-blue-600 hover:underline">416. 分割等和子集</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="322"><a href="https://leetcode.cn/problems/coin-change/" target="_blank" class="text-blue-600 hover:underline">322. 零钱兑换</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="518"><a href="https://leetcode.cn/problems/coin-change-2/" target="_blank" class="text-blue-600 hover:underline">518. 零钱兑换 II</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">三、股票买卖</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="121"><a href="https://leetcode.cn/problems/best-time-to-buy-and-sell-stock/" target="_blank" class="text-blue-600 hover:underline">121. 买卖股票的最佳时机</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="122"><a href="https://leetcode.cn/problems/best-time-to-buy-and-sell-stock-ii/" target="_blank" class="text-blue-600 hover:underline">122. 买卖股票的最佳时机 II</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="188"><a href="https://leetcode.cn/problems/best-time-to-buy-and-sell-stock-iv/" target="_blank" class="text-blue-600 hover:underline">188. 买卖股票的最佳时机 IV</a></label></li>
        </ul>

        <p class="text-center text-gray-500 mt-12">作者：灵茶山艾府 | <a href="https://leetcode.cn/discuss/post/3581838/" target="_blank" class="text-blue-600 hover:underline">原文链接</a></p>
    </div>

    <script>
        const chapter = 'chapter-07';
        const saved = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
        document.querySelectorAll('input[data-id]').forEach(cb => {
            if (saved[cb.dataset.id]) cb.checked = true;
            cb.addEventListener('change', function() {
                const progress = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
                if (this.checked) progress[this.dataset.id] = true;
                else delete progress[this.dataset.id];
                localStorage.setItem(chapter + '-progress', JSON.stringify(progress));
            });
        });
    </script>
</body>
</html>
