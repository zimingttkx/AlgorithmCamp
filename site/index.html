<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Camp · 刷题进度追踪</title>

  <!-- Critical CSS: Inlined for first screen render -->
  <style>
    /* Critical CSS - Minimal styles for entry screen */
    :root {
      --mc-bg: #1a1a2e;
      --mc-sky-dark: #1a3a6e;
      --mc-grass-top: #7cc427;
      --mc-grass: #5a8a2a;
      --mc-dirt: #8b6340;
      --mc-stone: #7a7a7a;
      --mc-stone-light: #9a9a9a;
      --mc-wood: #9c7a3c;
      --mc-diamond: #4de3e3;
      --mc-text: #f0f0e0;
      --mc-text-dim: #aaaaaa;
      --mc-panel: #2d2d2d;
      --mc-panel-light: #3a3a3a;
      --mc-coal: #2a2a2a;
      --mc-yellow: #ffff55;
      --mc-sand: #d4c27a;
      --pixel-font: 'JetBrains Mono', 'Courier New', Courier, monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px}
    body{font-family:var(--pixel-font);background:var(--mc-bg);color:var(--mc-text);min-height:100vh;text-rendering:optimizeSpeed;-webkit-font-smoothing:none;-moz-osx-font-smoothing:unset}
    /* Skeleton loading screen */
    #skeleton-screen{position:fixed;inset:0;z-index:99999;background:var(--mc-sky-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    .skeleton-block{width:32px;height:32px;border:3px solid #000;border-bottom-color:#333;border-right-color:#333;animation:skeletonBounce .8s ease-in-out infinite}
    .skeleton-block:nth-child(1){background:var(--mc-grass-top);animation-delay:0s}
    .skeleton-block:nth-child(2){background:var(--mc-dirt);animation-delay:.15s}
    .skeleton-block:nth-child(3){background:var(--mc-stone);animation-delay:.3s}
    .skeleton-block:nth-child(4){background:var(--mc-wood);animation-delay:.45s}
    .skeleton-block:nth-child(5){background:var(--mc-diamond);animation-delay:.6s}
    @keyframes skeletonBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    .skeleton-title{font-size:2rem;font-weight:700;color:var(--mc-grass-top);text-shadow:4px 4px 0 #000;letter-spacing:4px;text-transform:uppercase;animation:skeletonPulse 1.5s ease-in-out infinite}
    @keyframes skeletonPulse{0%,100%{opacity:1}50%{opacity:.6}}
    .skeleton-bar-wrap{width:280px;display:flex;flex-direction:column;gap:8px}
    .skeleton-bar-label{font-size:.75rem;color:var(--mc-text-dim);text-align:center;letter-spacing:2px}
    .skeleton-bar-outer{width:100%;height:18px;background:#111;border:3px solid #555;border-bottom-color:#222;border-right-color:#222;overflow:hidden}
    .skeleton-bar-inner{height:100%;background:var(--mc-grass-top);width:0%;transition:width .05s linear}
    .skeleton-hidden{display:none!important}
  </style>

  <!-- Font preload for faster text render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">

  <!-- Preload main JS for faster interaction -->
  <link rel="preload" as="script" href="js/main.js">

  <!-- Non-critical CSS: Loaded async -->
  <link rel="stylesheet" href="css/style.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="css/style.css"></noscript>
</head>
<body>

<!-- Skeleton Loading Screen -->
<div id="skeleton-screen">
  <div class="skeleton-blocks">
    <div class="skeleton-block"></div>
    <div class="skeleton-block"></div>
    <div class="skeleton-block"></div>
    <div class="skeleton-block"></div>
    <div class="skeleton-block"></div>
  </div>
  <div class="skeleton-title">&#x26CF; Algorithm Camp &#x26CF;</div>
  <div class="skeleton-bar-wrap">
    <div class="skeleton-bar-label" id="skeleton-label">Loading...</div>
    <div class="skeleton-bar-outer"><div class="skeleton-bar-inner" id="skeleton-bar"></div></div>
  </div>
</div>

<!-- Entry Screen -->
<div id="entry-screen">
  <!-- Left: Profile -->
  <div class="entry-left">
    <div class="entry-profile-hero">
      <img id="profile-avatar" src="" alt="avatar" class="profile-avatar" width="96" height="96" fetchpriority="high">
      <div class="profile-info">
        <div class="profile-name" id="profile-name">zimingttkx</div>
        <div class="profile-login" id="profile-login">@zimingttkx</div>
        <div class="profile-bio" id="profile-bio">算法 · 机器学习 · 网络安全 · C++</div>
        <div class="profile-stats">
          <div class="profile-stat"><span id="stat-repos">4</span><br>仓库</div>
          <div class="profile-stat"><span id="stat-followers">—</span><br>粉丝</div>
          <div class="profile-stat"><span id="stat-following">—</span><br>关注</div>
          <div class="profile-stat"><span id="stat-stars">—</span><br>Stars</div>
        </div>
        <a id="profile-link" href="https://github.com/zimingttkx" target="_blank" class="mc-btn mc-btn-sm" style="margin-top:10px;display:inline-block">&#x1F517; GitHub</a>
      </div>
    </div>

    <!-- LeetCode Profile Section -->
    <div class="entry-profile-section leetcode-section" id="leetcode-section">
      <div class="profile-section-title">&#x2694; LeetCode 用户绑定</div>
      <div class="leetcode-bind-form" id="leetcode-bind-form">
        <input type="text" id="leetcode-username-input" placeholder="输入 LeetCode 用户名" class="leetcode-input" maxlength="50">
        <button class="mc-btn mc-btn-sm" id="leetcode-bind-btn" onclick="bindLeetCode()">&#x2714; 绑定</button>
      </div>
      <div class="leetcode-profile hidden" id="leetcode-profile">
        <div class="leetcode-profile-header">
          <img id="leetcode-avatar" src="" alt="avatar" class="leetcode-avatar" width="56" height="56" loading="lazy">
          <div class="leetcode-info">
            <div class="leetcode-name" id="leetcode-name">—</div>
            <div class="leetcode-ranking" id="leetcode-ranking">全球排名: —</div>
          </div>
          <button class="mc-btn mc-btn-sm" id="leetcode-change-btn" onclick="changeLeetCode()">&#x270E; 修改</button>
        </div>
        <div class="leetcode-stats">
          <div class="leetcode-stat"><span id="leetcode-total">0</span><br>总解题</div>
          <div class="leetcode-stat easy"><span id="leetcode-easy">0</span><br>简单</div>
          <div class="leetcode-stat medium"><span id="leetcode-medium">0</span><br>中等</div>
          <div class="leetcode-stat hard"><span id="leetcode-hard">0</span><br>困难</div>
        </div>
      </div>
      <div class="leetcode-error hidden" id="leetcode-error"></div>
    </div>

    <div class="entry-profile-section">
      <div class="profile-section-title">&#x1F4E6; 项目仓库</div>
      <div class="repo-grid" id="repo-grid"><div class="profile-loading">加载中...</div></div>
    </div>
    <div class="entry-profile-section">
      <div class="profile-section-title">&#x1F4CA; 最近动态</div>
      <div class="events-list" id="events-list"><div class="profile-loading">加载中...</div></div>
    </div>
  </div>

  <!-- Right: Entry -->
  <div class="entry-right">
    <div class="entry-blocks">
      <div class="entry-block"></div>
      <div class="entry-block"></div>
      <div class="entry-block"></div>
      <div class="entry-block"></div>
      <div class="entry-block"></div>
    </div>
    <div class="entry-title">&#x26CF; Algorithm Camp &#x26CF;</div>
    <div class="entry-sub">题单来源：灵茶山艾府 · 个人刷题进度追踪</div>
    <div class="entry-bar-wrap">
      <div class="entry-bar-label" id="entry-label">Loading...</div>
      <div class="entry-bar-outer"><div class="entry-bar-inner" id="entry-bar"></div></div>
    </div>
    <div class="entry-btns">
      <button class="mc-btn" id="enter-btn" style="display:none" onclick="enterApp()">&#x25B6; Enter Camp</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">

  <!-- Bubble Map View -->
  <div id="map-view">
    <div class="map-header">
      <div class="map-title">&#x26CF; 选择章节</div>
      <div class="map-subtitle">点击方块开始刷题 · 共 12 个专题</div>
      <div class="map-header-row">
        <div class="map-global-stat">已完成 <span id="map-global-done">0</span> 题</div>
      </div>
    </div>
    <div id="bubble-container"></div>
  </div>

  <!-- Chapter View -->
  <div id="chapter-view" style="display:none">
    <div id="mini-nav">
      <div class="mini-nav-header" onclick="backToMap()">
        <span class="back-arrow">&#x2190;</span>
        <span>章节地图</span>
      </div>
      <div id="mini-nav-list"></div>
      <div class="mini-global-progress">
        <div class="prog-label">全站 <span id="global-pct">0%</span></div>
        <div class="mc-progress-outer">
          <div class="mc-progress-inner" id="global-progress" style="width:0%"></div>
        </div>
      </div>
    </div>
    <main id="main">
      <div class="mc-loading">加载中...</div>
    </main>
  </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
