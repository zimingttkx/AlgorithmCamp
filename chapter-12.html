<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter-12 字符串</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .problem-done { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">chapter-12 字符串</h1>
        <p class="text-center text-gray-500 mb-4">来源：<a href="https://leetcode.cn/discuss/post/3144832/" target="_blank" class="text-blue-600 hover:underline">原题单</a></p>
        
        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">一、KMP</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="28"><a href="https://leetcode.cn/problems/find-the-index-of-first-occurrence/" target="_blank" class="text-blue-600 hover:underline">28. 找出字符串中第一个匹配项的下标</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="459"><a href="https://leetcode.cn/problems/repeated-substring-pattern/" target="_blank" class="text-blue-600 hover:underline">459. 重复的子字符串</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">二、Manacher</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="5"><a href="https://leetcode.cn/problems/longest-palindromic-substring/" target="_blank" class="text-blue-600 hover:underline">5. 最长回文子串</a></label></li>
            <li><label><input type="checkbox" class="mr-2" data-id="647"><a href="https://leetcode.cn/problems/palindromic-substrings/" target="_blank" class="text-blue-600 hover:underline">647. 回文子串</a></label></li>
        </ul>

        <h2 class="text-2xl font-bold mt-8 mb-4 text-blue-800">三、字符串哈希</h2>
        <ul class="space-y-2 ml-4">
            <li><label><input type="checkbox" class="mr-2" data-id="1044"><a href="https://leetcode.cn/problems/longest-duplicate-substring/" target="_blank" class="text-blue-600 hover:underline">1044. 最长重复子串</a></label></li>
        </ul>

        <p class="text-center text-gray-500 mt-12">作者：灵茶山艾府 | <a href="https://leetcode.cn/discuss/post/3144832/" target="_blank" class="text-blue-600 hover:underline">原文链接</a></p>
    </div>

    <script>
        const chapter = 'chapter-12';
        const saved = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
        document.querySelectorAll('input[data-id]').forEach(cb => {
            if (saved[cb.dataset.id]) cb.checked = true;
            cb.addEventListener('change', function() {
                const progress = JSON.parse(localStorage.getItem(chapter + '-progress') || '{}');
                if (this.checked) progress[this.dataset.id] = true;
                else delete progress[this.dataset.id];
                localStorage.setItem(chapter + '-progress', JSON.stringify(progress));
            });
        });
    </script>
</body>
</html>
